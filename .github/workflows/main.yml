name: Build Dkakin APK (Clean Rebuild)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.2'
          channel: 'stable'

      # إنشاء مشروع Flutter جديد تمامًا (بدون أي v1)
      - name: Create fresh Flutter project
        run: flutter create --org com.dkakin dkakin_fresh

      # نسخ كودنا إلى المشروع الجديد
      - name: Copy our code
        run: |
          cp -r lib/ dkakin_fresh/lib/
          cp pubspec.yaml dkakin_fresh/pubspec.yaml
          # نسخ أي ملفات أندرويد مخصصة إذا أردت الاحتفاظ بها
          cp -r android/app/src/main/AndroidManifest.xml dkakin_fresh/android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          cp -r android/app/src/main/kotlin/ dkakin_fresh/android/app/src/main/kotlin/ 2>/dev/null || true
          # نسخ assets إن وجدت
          cp -r assets/ dkakin_fresh/assets/ 2>/dev/null || true

      - name: Build APK
        working-directory: dkakin_fresh
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: dkakin_fresh/build/app/outputs/flutter-apk/app-release.apk
