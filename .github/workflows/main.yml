name: Build Dkakin APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Force Android embedding v2
        run: |
          # إضافة السطر الذي يؤكد v2 في build.gradle إن لم يكن موجوداً
          cd android/app
          if ! grep -q "embeddingVersion" build.gradle; then
            sed -i '/android {/a \    flutter { embeddingVersion = 2 }' build.gradle
          fi

      - name: Deep clean
        run: |
          flutter clean
          rm -rf android/.gradle android/app/build

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
